name: Publish to Sajmons Maven

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      release:
        description: "Publish as release (otherwise SNAPSHOT)"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and publish
        env:
          RELEASE_MODE: ${{ inputs.release && 'true' || 'false' }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_TOKEN: ${{ secrets.MAVEN_TOKEN }}
        run: ./gradlew build publishMavenJavaPublicationToSajmonRepository --no-daemon
